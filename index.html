<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipped. — Anthropic Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --ink: #000000;
      --muted: #666666;
      --rule: #E5E5E5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 5rem 1.5rem; }
    .masthead {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 2.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }
    .masthead .dot { color: var(--ink); }
    .deck {
      color: var(--muted);
      font-size: 1.0625rem;
      margin-bottom: 3rem;
      max-width: 32rem;
    }
    .rule {
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 3rem 0 2rem;
    }
    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    ul.list { list-style: none; }
    ul.list li { padding: 0.6rem 0; border-bottom: 1px solid var(--rule); }
    ul.list a {
      color: var(--ink);
      text-decoration: none;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }
    ul.list a:hover { text-decoration: underline; }
    ul.list .date { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 0.9375rem; }
    .empty { color: var(--muted); font-style: italic; }
    footer {
      margin-top: 5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
      color: var(--muted);
      font-size: 0.875rem;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0A0A0A; --ink: #FFFFFF; --muted: #999999; --rule: #2A2A2A; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="masthead">Shipped<span class="dot">.</span></h1>
    <p class="deck">A daily and weekly index of what Anthropic ships. Generated by a scheduled agent. The page is the source.</p>

    <hr class="rule">
    <div class="section-label">Daily</div>
    <ul class="list" id="daily">
      <li class="empty">First daily page lands tonight.</li>
    </ul>

    <hr class="rule">
    <div class="section-label">Weekly</div>
    <ul class="list" id="weekly">
      <li class="empty">First weekly issue compiles Friday night.</li>
    </ul>

    <footer>
      Generated branch: <code>daily-pages</code>. Source: <a href="https://github.com/eddiebelaval/shipped" style="color:inherit;">eddiebelaval/shipped</a>.
    </footer>
  </div>
</body>
</html>
