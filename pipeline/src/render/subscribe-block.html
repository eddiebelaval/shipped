<!-- ═════════════════════════════════════════
     SUBSCRIBE BLOCK — daily / weekly / monthly pages
     ═════════════════════════════════════════

     The single source of truth for the subscribe form on pages published to
     the daily-pages branch (served from eddiebelaval.github.io). Injected at
     the end of the document by render-daily.py and render-monthly.py, and
     backfilled into already-published pages by scripts/backfill-subscribe.py.

     Do not write a literal closing body or html tag anywhere in this file,
     including in this comment. The injectors locate their anchor by counting
     those tags, and a copy inside a comment (invisible to a browser, which
     skips comments) makes a patched page look malformed to the next tool that
     parses it.

     Two things differ from the issue-page block in template.html:

       1. The POST URL is ABSOLUTE. These pages are served from github.io, not
          id8labs.app, so a relative /api/... path would hit GitHub Pages and
          404. The subscribe route allows this origin explicitly in CORS_ORIGINS
          — if that list ever changes, this form breaks silently.

       2. {{SOURCE}} is substituted per page type (shipped-daily,
          shipped-weekly, shipped-monthly) for attribution. It MUST keep the
          "shipped" prefix: the API only merges a reader onto the Shipped. list
          when the source starts with it.
-->
<style>
  /* Spine CTA. Lives here rather than in <head> because two published pages
     are truncated and have no </head> to inject into; CSS applies document-wide
     from anywhere, so the end of <body> is the one anchor every page has.
     Only takes effect on pages that actually carry a pub-bar. */
  .pub-bar-cta{
    display:inline-block;
    background:var(--ink, #0b0b0b);
    color:var(--paper, #fafaf7);
    text-decoration:none;
    border:1px solid var(--ink, #0b0b0b);
    border-radius:10px;
    font-family:var(--narrow, 'Archivo Narrow','Archivo',system-ui,sans-serif);
    font-weight:700;
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    padding:6px 14px;
    transition:background .15s ease,border-color .15s ease;
  }
  .pub-bar-cta:hover{
    background:var(--orange, #ff6b35);
    border-color:var(--orange, #ff6b35);
    color:var(--ink, #0b0b0b);
  }
  @media (max-width:720px){
    .pub-bar-hide-sm{display:none}
    .pub-bar-cta{padding:5px 10px;letter-spacing:.12em}
  }

  .ship-sub {
    background: var(--ink, #0b0b0b);
    color: var(--paper, #fafaf7);
    padding: 72px 64px;
    margin: 56px auto;
    max-width: 1280px;
    text-align: center;
    /* clears the sticky pub-bar when jumped to from the top CTA */
    scroll-margin-top: 64px;
  }
  .ship-sub-kicker {
    font-family: var(--narrow, 'Archivo Narrow','Archivo',system-ui,sans-serif);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--orange, #ff6b35);
    margin-bottom: 18px;
  }
  .ship-sub h3 {
    font-family: var(--disp, 'Fraunces',Georgia,serif);
    font-weight: 600;
    font-style: italic;
    font-size: clamp(26px, 3.6vw, 40px);
    line-height: 1.15;
    margin: 0 0 16px;
    color: var(--paper, #fafaf7);
  }
  .ship-sub p {
    font-family: var(--sans, 'Archivo',system-ui,sans-serif);
    font-size: 15px;
    line-height: 1.6;
    color: rgba(250,250,247,.72);
    max-width: 560px;
    margin: 0 auto 28px;
  }
  .ship-sub-form {
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }
  .ship-sub-row {
    display: flex;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    transition: border-color .15s;
  }
  .ship-sub-row:focus-within { border-color: var(--orange, #ff6b35); }
  .ship-sub-form input[type="email"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--paper, #fafaf7);
    font-family: var(--sans, 'Archivo',system-ui,sans-serif);
    font-size: 15px;
    padding: 16px 20px;
    -webkit-appearance: none;
    min-width: 0;
  }
  .ship-sub-form input::placeholder { color: rgba(250,250,247,.4); }
  /* Honeypot — off-screen rather than display:none, so naive bots still fill it */
  .ship-sub-hp {
    position: absolute !important;
    left: -9999px !important;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
  .ship-sub-form button {
    background: var(--orange, #ff6b35);
    color: var(--ink, #0b0b0b);
    border: none;
    font-family: var(--narrow, 'Archivo Narrow','Archivo',system-ui,sans-serif);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: 0 28px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .ship-sub-form button:hover { background: #ff5722; }
  .ship-sub-form button:disabled { opacity: .5; cursor: wait; }
  .ship-sub-cadences {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .ship-sub-cadence {
    font-family: var(--narrow, 'Archivo Narrow','Archivo',system-ui,sans-serif);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(250,250,247,.66);
    display: inline-flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
  }
  .ship-sub-cadence input { accent-color: var(--orange, #ff6b35); cursor: pointer; }
  .ship-sub-status {
    margin-top: 16px;
    font-family: var(--sans, 'Archivo',system-ui,sans-serif);
    font-size: 14px;
    color: var(--orange, #ff6b35);
    min-height: 20px;
  }
  .ship-sub-status.error { color: #ff8b6b; }
  @media (max-width: 540px) {
    .ship-sub { padding: 48px 22px; margin: 28px auto; }
    .ship-sub-cadences { gap: 14px; }
  }
</style>
<section class="ship-sub" id="subscribe">
  <div class="ship-sub-kicker">Stay on the frontier</div>
  <h3>Get <em>Shipped.</em> in your inbox.</h3>
  <p>Daily digest at 9 PM ET. Weekly magazine every Friday morning. Six labs, one feed. No spam, one-click unsubscribe.</p>
  <form class="ship-sub-form" id="ship-sub-form">
    <div class="ship-sub-row">
      <input type="email" name="email" placeholder="your@email.com" required autocomplete="email" aria-label="Email address">
      <button type="submit" id="ship-sub-btn">Subscribe &#x2192;</button>
    </div>
    <input type="text" name="website" class="ship-sub-hp" tabindex="-1" autocomplete="off" aria-hidden="true">
    <div class="ship-sub-cadences">
      <label class="ship-sub-cadence"><input type="checkbox" name="cadences" value="nightly" checked> Daily digest</label>
      <label class="ship-sub-cadence"><input type="checkbox" name="cadences" value="weekly" checked> Weekly magazine</label>
      <label class="ship-sub-cadence"><input type="checkbox" name="cadences" value="monthly"> Monthly roundup</label>
    </div>
  </form>
  <div class="ship-sub-status" id="ship-sub-status" aria-live="polite"></div>
</section>
<script>
(function () {
  var form = document.getElementById('ship-sub-form');
  if (!form) return;
  var btn = document.getElementById('ship-sub-btn');
  var status = document.getElementById('ship-sub-status');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var data = new FormData(form);
    var email = (data.get('email') || '').toString().trim();
    if (!email) return;

    var cadences = data.getAll('cadences').map(String);
    status.className = 'ship-sub-status';
    status.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Subscribing…';

    try {
      var res = await fetch('https://id8labs.app/api/newsletter/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          source: '{{SOURCE}}',
          website: (data.get('website') || '').toString(),
          cadences: cadences.length ? cadences : ['nightly', 'weekly']
        })
      });
      var body = await res.json().catch(function () { return {}; });
      if (res.ok) {
        status.textContent = body.isNewSubscriber === false
          ? 'Already on the list.'
          : 'You’re in. Next edition lands soon.';
        if (body.isNewSubscriber !== false) form.reset();
      } else {
        status.className = 'ship-sub-status error';
        status.textContent = body.error || 'Could not subscribe right now. Try again in a moment.';
      }
    } catch (err) {
      status.className = 'ship-sub-status error';
      status.textContent = 'Could not subscribe right now. Try again in a moment.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Subscribe →';
    }
  });
})();
</script>
